workspace: nextsaga

ecosystems:
  typescript:
    manifest: package.json
    lockfile: bun.lock
    packages:
      - apps/server
      - packages/api
      - packages/design-system

  dart:
    manifest: pubspec.yaml
    lockfile: pubspec.lock
    packages:
      - apps/flutter
      - packages/api/clients/dart

bridges:
  - source: packages/api
    consumers:
      - packages/api/clients/dart
    artifact: packages/api/openapi.json

  - source: packages/design-system
    consumers:
      - apps/flutter
    artifact: packages/design-system/tokens.json

env:
  shared:
    - API_URL
    - API_PORT
  files:
    - apps/server/.env.example
    - apps/flutter/.env.example
